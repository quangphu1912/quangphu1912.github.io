---
layout: default
---

<article class="page-content">
    <div class="container">
        <div class="section">
            {% unless page.hide_header %}
            <header class="page-header page-header--spaced">
                <h1>{{ page.title }}</h1>
                {% if page.description %}
                <p class="page-description page-description--headed">
                    {{ page.description }}
                </p>
                {% endif %}
            </header>
            {% endunless %}

            <div class="page-body prose">
                {{ content }}
            </div>
        </div>
    </div>
</article>
