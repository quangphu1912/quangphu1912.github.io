<!DOCTYPE html>
<html lang="en">
<head>
  <script>document.documentElement.classList.add('js');</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="dark"><!-- single dark theme; stops browser/auto-dark guessing -->
  
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="author" content="{{ site.author }}">

  <!-- Structured Data - Person schema (jekyll-seo-tag owns WebSite + Article + OG/Twitter/canonical) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "{{ site.name }}",
    "jobTitle": "{{ site.job_title }}",
    "url": "{{ site.url }}",
    "sameAs": [
      "https://www.linkedin.com/in/{{ site.linkedin_username }}",
      "https://github.com/{{ site.github_username }}"
    ]
  }
  </script>

  <!-- Stylesheets -->
  <link rel="preload" href="{{ '/assets/fonts/InterVariable.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="{{ '/assets/fonts/Jost-Variable.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  
  <!-- Mermaid is conditionally included by content layouts (project, notebook) -->
  <!-- See: _includes/mermaid.html -->

  <!-- Jekyll SEO Tag -->
  {% seo %}
  
  <!-- Jekyll Feed -->
  {% feed_meta %}
</head>
<body{% if page.category %} data-category="{{ page.category }}"{% endif %}>
  <a href="#main-content" class="skip-to-content">Skip to content</a>
  
  {% include header.html %}
  
  <main id="main-content">
    {{ content }}
  </main>
  
  {% include footer.html %}
  
  <!-- Analytics (production only) -->
  {% if jekyll.environment == 'production' %}
    {% include analytics.html %}
  {% endif %}

  <script type="module" src="{{ '/assets/js/transition-direction.js' | relative_url }}"></script>
  <script type="module" src="{{ '/assets/js/nav.js' | relative_url }}"></script>
  <script type="module" src="{{ '/assets/js/reveal.js' | relative_url }}"></script>
  <script type="module" src="{{ '/assets/js/count-up.js' | relative_url }}"></script>
</body>
</html>
