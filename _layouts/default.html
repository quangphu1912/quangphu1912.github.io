<!DOCTYPE html>
<html lang="en">
<head>
  <script>document.documentElement.classList.add('js');</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark"><!-- single dark theme; stops browser/auto-dark guessing -->

  <title>{% if page.url == '/' %}Home - {{ site.name }}{% elsif page.title %}{{ page.title }} - {{ site.name }}{% else %}{{ site.name }}{% endif %}</title>

  <!-- SEO Meta Tags (description + OG/Twitter/canonical are owned by jekyll-seo-tag below) -->
  <meta name="author" content="{{ site.author }}">

  <!-- Structured Data - Person schema (jekyll-seo-tag owns WebSite + Article + OG/Twitter/canonical) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "{{ site.name }}",
    "jobTitle": "{{ site.job_title }}",
    "url": "{{ site.url }}",
    "sameAs": [
      "{% include social-url.html network='linkedin' %}",
      "{% include social-url.html network='github' %}"
    ]
  }
  </script>

  <!-- Stylesheets -->
  <link rel="preload" href="{{ '/assets/fonts/InterVariable.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="{{ '/assets/fonts/HankenGrotesk-Variable.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">

  <!-- Mermaid is conditionally included by content layouts (project, notebook) -->
  <!-- See: _includes/mermaid.html -->

  <!-- Jekyll SEO Tag (title=false: the page title tag above is ours; seo-tag still emits description + OG/Twitter/canonical) -->
  {% seo title=false %}

  <!-- Jekyll Feed -->
  {% feed_meta %}
</head>
<body{% if page.category %} data-category="{{ page.category }}"{% endif %}>
  <div class="page-progress" aria-hidden="true"></div>
  <a href="#main-content" class="skip-to-content">Skip to content</a>

  {% include header.html %}

  <main id="main-content">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Analytics (production only) -->
  {% if jekyll.environment == 'production' %}
    {% include analytics.html %}
  {% endif %}

  <!-- Pre-snapshot scroll-reveal (Safari View-Transition flash fix). Runs SYNCHRONOUSLY here at
       end-of-body parse - BEFORE the browser captures the incoming cross-document View Transition
       snapshot. A deferred module (reveal.js) can't guarantee that on Safari: it runs AFTER the
       snapshot, so the cards rise blank then fill in = the flash. Only the VT-nav path reveals
       here (a reload never runs a View Transition); cold load / refresh defer to reveal.js so the
       work-rows slide-in entrance still plays. Inline + classic (not a module) so it isn't deferred,
       and placed last in <body> so every [data-reveal] is parsed; it blocks on main.css (already in
       <head>), so .is-visible is computed at the final opacity before first paint = no slide, solid
       snapshot. Mirrors reveal.js's arrival check + in-view test; see assets/js/reveal.js. -->
  <script>
    (function () {
      var nav = performance.getEntriesByType('navigation')[0];
      var viaTransition =
        (nav && nav.type === 'navigate' && document.referrer.indexOf(location.origin + '/') === 0) ||
        (nav && nav.type === 'back_forward');
      if (!viaTransition) return;
      var els = document.querySelectorAll('[data-reveal]');
      for (var i = 0; i < els.length; i++) {
        var r = els[i].getBoundingClientRect();
        if (r.top < window.innerHeight && r.bottom > 0) els[i].classList.add('is-visible');
      }
    })();
  </script>

  <!-- ?v=site.time busts the browser/CDN cache after a JS change (same scheme as the CSS link above), so returning visitors and refreshes never run a stale module. -->
  <script type="module" src="{{ '/assets/js/transition-direction.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script type="module" src="{{ '/assets/js/page-progress.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script type="module" src="{{ '/assets/js/nav.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script type="module" src="{{ '/assets/js/reveal.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  <script type="module" src="{{ '/assets/js/count-up.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
</body>
</html>
