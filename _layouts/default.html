<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="author" content="{{ site.author }}">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% assign og_image = page.image | default: '/assets/images/hero/hero.jpg' %}
  <meta property="og:image" content="{{ site.url }}{{ og_image }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="{{ site.url }}{{ page.url }}">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="twitter:image" content="{{ site.url }}{{ og_image }}">

  <!-- Canonical URL -->
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">

  <!-- Structured Data — Person schema (jekyll-seo-tag handles WebSite) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "{{ site.name }}",
    "jobTitle": "{{ site.job_title }}",
    "url": "{{ site.url }}",
    "sameAs": [
      "https://www.linkedin.com/in/{{ site.linkedin_username }}",
      "https://github.com/{{ site.github_username }}"
    ]
  }
  </script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  
  <!-- Mermaid is conditionally included by content layouts (case-study, project, notebook) -->
  <!-- See: _includes/mermaid.html -->

  <!-- Jekyll SEO Tag -->
  {% seo %}
  
  <!-- Jekyll Feed -->
  {% feed_meta %}
</head>
<body>
  <a href="#main-content" class="skip-to-content">Skip to content</a>
  
  {% include header.html %}
  
  <main id="main-content">
    {{ content }}
  </main>
  
  {% include footer.html %}
  
  <!-- Analytics (production only) -->
  {% if jekyll.environment == 'production' %}
    {% include analytics.html %}
  {% endif %}

  <script src="{{ '/assets/js/nav.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/reveal.js' | relative_url }}" defer></script>
</body>
</html>
