<footer class="site-footer">
  <div class="container">
    <div class="footer-bar">
      <span class="footer-copy">© {{ 'now' | date: "%Y" }} {{ site.name }}</span>
      <span class="footer-sep" aria-hidden="true">·</span>
      {% if site.linkedin_username %}
      <a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener noreferrer" class="footer-link">LinkedIn</a>
      <span class="footer-sep" aria-hidden="true">·</span>
      {% endif %}
      {% if site.github_username %}
      <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener noreferrer" class="footer-link">GitHub</a>
      <span class="footer-sep" aria-hidden="true">·</span>
      {% endif %}
      <a class="footer-link" data-user="{{ site.email | split: '@' | first }}" data-domain="{{ site.email | split: '@' | last }}" aria-label="Email">Email</a>
    </div>
  </div>
</footer>
