<figure class="image-thumbnail">
  {% comment %} Inline the SVG (authored with currentColor) so it inherits the project's category
  hue - an external <img src=*.svg> can't be CSS-tinted. hero_image: true requires
  _includes/projects/<slug>.svg (a missing file fails the build, by design; see CLAUDE.md);
  raster <img> otherwise. The SVG carries its own role="img" aria-label, which is the
  thumbnail's accessible name (same label as the detail cover). {% endcomment %}
  {% if include.project.hero_image %}
    {% include projects/{{ include.project.slug }}.svg %}
  {% elsif include.project.image %}
    <img src="{{ include.project.image | relative_url }}" width="800" height="450"
         alt="{{ include.project.image_alt | default: include.project.title }}" loading="lazy">
  {% endif %}
</figure>
